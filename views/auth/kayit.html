<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFAD | Kayıt Ol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body" style="background: radial-gradient(circle at top left, #003366, #001a33);">
  <div class="auth-container">
    <div class="glass-card" style="max-width: 600px; width: 100%; padding: 45px; margin: 40px 0;">
      <div style="text-align: center; margin-bottom: 30px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/AFAD_logo.png" alt="AFAD Logo" style="height: 60px; margin-bottom: 15px;">
        <h1 style="color: var(--afad-navy); font-weight: 800; font-size: 1.8rem; margin: 0;">Sisteme <span style="color: var(--afad-red);">Katıl</span></h1>
        <p style="color: #64748b; margin-top: 5px;">Afet koordinasyon ağına hızlıca kayıt olun.</p>
      </div>
      
      <form method="POST" action="/kayit">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label><i class="fas fa-user" style="margin-right: 8px;"></i> AD</label>
            <input type="text" name="ad" placeholder="Adınız" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-user" style="margin-right: 8px;"></i> SOYAD</label>
            <input type="text" name="soyad" placeholder="Soyadınız" required>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-envelope" style="margin-right: 8px;"></i> E-POSTA</label>
          <input type="email" name="email" placeholder="email@test.com" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-phone" style="margin-right: 8px;"></i> TELEFON</label>
          <input type="tel" name="telefon" placeholder="05XX XXX XX XX">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label><i class="fas fa-lock" style="margin-right: 8px;"></i> ŞİFRE</label>
            <input type="password" name="sifre" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-shield-alt" style="margin-right: 8px;"></i> TEKRAR</label>
            <input type="password" name="sifre_tekrar" placeholder="••••••••" required>
          </div>
        </div>

        <div class="form-group" style="margin-top: 10px;">
          <label><i class="fas fa-briefcase" style="margin-right: 8px;"></i> SİSTEM ROLÜ</label>
          <select name="rol" id="roleSelect" required style="border-left: 4px solid var(--afad-red);">
            <option value="">-- Seçiniz --</option>
            <option value="gonullu">🛡️ Gönüllü (Saha Desteği)</option>
            <option value="kazazede">🆘 Kazazede (Yardım Talebi)</option>
            <option value="yetkili">🏢 Yetkili (Koordinasyon)</option>
          </select>
        </div>

        <div id="volunteerFields" style="display: none; background: rgba(255,255,255,0.5); padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid var(--afad-blue);">
          <div class="form-group">
            <label><i class="fas fa-tools" style="margin-right: 8px;"></i> UZMANLIK ALANI</label>
            <select name="uzmanlik" style="background: white; cursor: pointer; padding: 12px; border-radius: 12px; font-weight: 500;">
              <option value="Arama Kurtarma">🔍 Arama Kurtarma (Saha / Enkaz)</option>
              <option value="İlk Yardım / Sağlık">🏥 İlk Yardım / Sağlık (Paramedik/Doktor)</option>
              <option value="Lojistik / Depo">📦 Lojistik ve Depo Yönetimi</option>
              <option value="Enkaz Kaldırma / Operatör">🏗️ Enkaz Kaldırma / İş Makinesi Operatörü</option>
              <option value="Çadır ve Barınma Kurulumu">⛺ Çadır ve Konteynır Kurulumu</option>
              <option value="Haberleşme / Telsiz">📻 Haberleşme / Telsiz Operatörü</option>
              <option value="Psikososyal Destek">🤝 Psikososyal Destek (Psikolog/Sosyal Hizmet)</option>
              <option value="İnsani Yardım Dağıtımı">🥣 İnsani Yardım ve Gıda Dağıtımı</option>
              <option value="Teknik Destek / Bilişim">💻 Teknik Destek / Bilişim</option>
              <option value="KBRN Uzmanı">☣️ KBRN (Tehlikeli Madde) Uzmanı</option>
              <option value="Tercümanlık">🗣️ Tercümanlık / Yabancı Dil Desteği</option>
              <option value="Ulaşım / Şoför">🚚 Ulaşım / Ağır Vasıta Şoförü</option>
              <option value="Cenaze Hizmetleri">🕊️ Cenaze / Defin Hizmetleri</option>
              <option value="Diğer">❔ Diğer Uzmanlıklar</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fas fa-battery-half" style="margin-right: 8px;"></i> İŞ KAPASİTESİ (Aynı anda kaç talebe bakabilir?)</label>
            <input type="number" name="kapasite" value="1" min="1" max="10">
          </div>
        </div>

        <script>
          document.getElementById('roleSelect').addEventListener('change', function() {
            const vFields = document.getElementById('volunteerFields');
            if (this.value === 'gonullu') {
              vFields.style.display = 'block';
            } else {
              vFields.style.display = 'none';
            }
          });
        </script>
        
        <button type="submit" class="btn-premium" style="width: 100%; margin-top: 20px;">HESABI OLUŞTUR VE DOĞRULA</button>
      </form>
      
      <div style="margin-top: 30px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px; text-align: center;">
        <p style="color: #64748b; font-size: 0.95rem;">
          Zaten hesabınız var mı? <a href="/giris" style="color: var(--afad-navy); font-weight: 600;">Giriş Yap</a>
        </p>
        <p style="margin-top: 10px;">
          <a href="/" style="color: #64748b; font-size: 0.9rem; text-decoration: none; opacity: 0.8;">← Ana Sayfaya Dön</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
