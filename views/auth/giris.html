<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFAD | Giriş Yap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="glass-card" style="max-width: 450px; width: 100%; padding: 45px; text-align: center;">
      <img src="/images/logo-v2.png" alt="AFAD Logo" style="height: 70px; margin-bottom: 25px;">
      <h1 style="color: var(--afad-navy); font-weight: 800; font-size: 2rem; margin-bottom: 30px;">Sisteme <span style="color: var(--afad-red);">Giriş</span></h1>
      
      <form method="POST" action="/giris">
        <div class="form-group" style="text-align: left;">
          <label><i class="fas fa-envelope" style="margin-right: 8px;"></i> E-POSTA</label>
          <input type="email" name="email" placeholder="email@test.com" required>
        </div>
        <div class="form-group" style="text-align: left;">
          <label><i class="fas fa-key" style="margin-right: 8px;"></i> ŞİFRE</label>
          <input type="password" name="sifre" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-premium" style="width: 100%; margin-top: 15px;">KİMLİK DOĞRULA VE GİRİŞ YAP</button>
      </form>
      
      <div style="margin-top: 30px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px;">
        <p style="color: #64748b; font-size: 0.95rem;">
          Hesabınız yok mu? <a href="/kayit" style="color: var(--afad-red); font-weight: 600;">Hemen Kayıt Ol</a>
        </p>
        <p style="margin-top: 10px;">
          <a href="/" style="color: var(--afad-navy); font-size: 0.9rem; text-decoration: none; opacity: 0.8;">← Ana Sayfaya Dön</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
