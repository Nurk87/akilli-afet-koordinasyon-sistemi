<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sistem Ayarları | AFAD</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f8fafc;">
  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 95%; max-width: 1400px; margin: 0 auto;">
      <div class="logo-afad">
        <span class="logo-text">🚨 AFET <span class="logo-accent">YÖNETİM</span></span>
      </div>
      <a href="/dashboard" class="btn btn-navy">Panale Dön</a>
    </div>
  </nav>

  <div class="container" style="max-width: 800px; margin: 50px auto;">
    <div class="glass-card" style="padding: 40px;">
      <h2 style="color: var(--afad-navy); margin-bottom: 20px;"><i class="fas fa-cog"></i> Sistem Ayarları</h2>
      <p style="color: #64748b;">Bu modül şu an için yapılandırma aşamasındadır. Yakında sistem parametrelerini buradan yönetebileceksiniz.</p>
      
      <div style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
        <h4 style="color: var(--afad-navy);">Mevcut Yapılandırma</h4>
        <ul style="list-style: none; padding: 0; color: #64748b; font-size: 0.9rem;">
          <li style="margin-bottom: 10px;"><i class="fas fa-check-circle" style="color: #10b981;"></i> Veritabanı: MSSQL</li>
          <li style="margin-bottom: 10px;"><i class="fas fa-check-circle" style="color: #10b981;"></i> Dil: Türkçe (UTF-8)</li>
          <li style="margin-bottom: 10px;"><i class="fas fa-check-circle" style="color: #10b981;"></i> Atama Algoritması: Greedy</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
