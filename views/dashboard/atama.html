<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Gönüllü Atama | AFAD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .atama-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 30px;
    }
    .panel-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }
    .item-list {
      flex: 1;
      overflow-y: auto;
      margin-top: 15px;
      padding-right: 10px;
    }
    .selectable-item {
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .selectable-item:hover {
      border-color: var(--afad-red);
      background: rgba(227, 6, 19, 0.02);
    }
    .selectable-item.selected {
      border-color: var(--afad-red);
      background: rgba(227, 6, 19, 0.05);
      box-shadow: 0 0 10px rgba(227, 6, 19, 0.1);
    }
    .sticky-header {
      position: sticky;
      top: 0;
      background: inherit;
      z-index: 10;
      padding-bottom: 10px;
      border-bottom: 2px solid #f1f5f9;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 95%; max-width: 1400px; margin: 0 auto;">
      <div class="logo-afad">
        <span class="logo-text">🚨 AFET <span class="logo-accent">ATAMA</span></span>
      </div>
      <div>
        <a href="/dashboard" class="btn btn-navy"><i class="fas fa-arrow-left"></i> Geri Dön</a>
      </div>
    </div>
  </nav>

  <div class="container" style="width: 95%; margin: 40px auto;">
    <h2 style="font-weight: 800; color: var(--afad-navy);">Gönüllü <span style="color: var(--afad-red);">Koordinasyon Paneli</span></h2>
    <p style="color: #64748b;">Onaylanmış talepleri saha gönüllüleri ile manuel olarak eşleştirin.</p>

    <div class="atama-container">
      <!-- Talepler Paneli -->
      <div class="panel-card">
        <div class="sticky-header">
          <h3 style="margin: 0;"><i class="fas fa-clipboard-check" style="color: #8b5cf6;"></i> Onaylanmış Talepler</h3>
          <p style="font-size: 0.85rem; color: #94a3b8; margin: 5px 0 0 0;">Atama bekleyen aktif yardım çağrıları.</p>
        </div>
        <div class="item-list" id="requests-list">
          <!-- Dinamik Yüklenecek -->
        </div>
      </div>

      <!-- Gönüllüler Paneli -->
      <div class="panel-card">
        <div class="sticky-header">
          <h3 style="margin: 0;"><i class="fas fa-user-ninja" style="color: #2563eb;"></i> Müsait Gönüllüler</h3>
          <p style="font-size: 0.85rem; color: #94a3b8; margin: 5px 0 0 0;">Bölgedeki aktif ve müsait saha personeli.</p>
        </div>
        <div class="item-list" id="volunteers-list">
          <!-- Dinamik Yüklenecek -->
        </div>
      </div>
    </div>

    <div style="margin-top: 30px; text-align: center;">
      <button id="assignBtn" class="btn btn-premium" style="padding: 18px 50px; font-size: 1.1rem;" disabled>
        <i class="fas fa-link"></i> SEÇİLENLERİ EŞLEŞTİR VE GÖNDER
      </button>
    </div>
  </div>

  <script>
    let selectedRequestId = null;
    let selectedVolunteerId = null;

    async function loadData() {
      // Get ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const targetId = urlParams.get('id');

      // Load Requests
      const reqRes = await fetch('/requests/api/list');
      const reqData = await reqRes.json();
      const approvedRequests = reqData.filter(r => r.durum === 'onaylandi' || r.durum === 'yeni');
      
      const requestsList = document.getElementById('requests-list');
      requestsList.innerHTML = approvedRequests.length === 0 ? '<p style="color:#94a3b8; padding:20px;">Atama bekleyen talep yok.</p>' : '';
      
      approvedRequests.forEach(req => {
        const div = document.createElement('div');
        div.className = 'selectable-item';
        if (targetId && req.id == targetId) div.classList.add('selected'), selectedRequestId = req.id;
        
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between;">
            <strong style="color:var(--afad-navy);">${req.baslik}</strong>
            <span style="font-size:0.7rem; background:${req.oncelik === 'acil' ? '#fee2e2' : '#f1f5f9'}; color:${req.oncelik === 'acil' ? '#dc2626' : '#64748b'}; padding:2px 8px; border-radius:10px;">${req.oncelik.toUpperCase()}</span>
          </div>
          <div style="font-size:0.85rem; color:#64748b; margin-top:5px;">
            <i class="fas fa-map-marker-alt"></i> ${req.il_adi} / ${req.ilce_adi}
          </div>
        `;
        div.onclick = () => {
          document.querySelectorAll('#requests-list .selectable-item').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedRequestId = req.id;
          checkSelection();
        };
        requestsList.appendChild(div);
      });

      // ... Volunteers ...
      const volRes = await fetch('/atamalar/api/available-volunteers');
      const volData = await volRes.json();
      
      const volunteersList = document.getElementById('volunteers-list');
      volunteersList.innerHTML = volData.length === 0 ? '<p style="color:#94a3b8; padding:20px;">Müsait gönüllü bulunamadı.</p>' : '';
      
      volData.forEach(vol => {
        const div = document.createElement('div');
        div.className = 'selectable-item';
        div.innerHTML = `
          <strong style="color:var(--afad-navy);">${vol.ad} ${vol.soyad}</strong>
          <div style="font-size:0.85rem; color:#64748b; margin-top:5px;">
            <i class="fas fa-id-card"></i> Kapasite: ${vol.kapasite} | <i class="fas fa-phone"></i> ${vol.telefon}
          </div>
        `;
        div.onclick = () => {
          document.querySelectorAll('#volunteers-list .selectable-item').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedVolunteerId = vol.id;
          checkSelection();
        };
        volunteersList.appendChild(div);
      });
      
      checkSelection();
    }

    function checkSelection() {
      document.getElementById('assignBtn').disabled = !(selectedRequestId && selectedVolunteerId);
    }

    document.getElementById('assignBtn').onclick = async () => {
      if (!selectedRequestId || !selectedVolunteerId) return;
      
      const res = await fetch('/atamalar/api/manual-assign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ talep_id: selectedRequestId, gonullu_id: selectedVolunteerId })
      });
      
      if (res.ok) {
        alert('Gönüllü başarıyla atandı ve ekipler yola çıkarıldı!');
        selectedRequestId = null;
        selectedVolunteerId = null;
        loadData();
        checkSelection();
      } else {
        alert('Atama işlemi sırasında hata oluştu.');
      }
    };

    loadData();
  </script>
</body>
</html>
