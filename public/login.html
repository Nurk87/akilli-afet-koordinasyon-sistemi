<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Giriş</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
    h3 { text-align: center; margin-bottom: 20px; color: #333; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;}
    button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    button:hover { background: #218838; }
    .error { color: red; font-size: 12px; text-align: center; display: none; }
  </style>
</head>
<body>

<div class="container">
  <h3>Giriş Yap</h3>
  <input id="email" type="email" placeholder="E-posta" required>
  <input id="password" type="password" placeholder="Şifre" required>
  
  <div id="error-msg" class="error">Lütfen e-posta ve şifrenizi girin.</div>

  <button onclick="login()">Giriş</button>
</div>

<script>
function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("error-msg");

  // FORM DOĞRULAMA
  if (!email || !password) {
      errorMsg.style.display = "block";
      return;
  }
  errorMsg.style.display = "none";

  fetch("http://localhost:3000/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {
    
    if(data.token) {
        // OTURUM YÖNETİMİ: Bilgileri tarayıcı hafızasına alıyoruz
        localStorage.setItem("token", data.token);
        localStorage.setItem("userRole", data.role);
        
        alert("Giriş başarılı! Yönlendiriliyorsunuz...");

        // ROL BAZLI YÖNLENDİRME (Routing)
        if (data.role === 'afad') {
            window.location.href = "admin-panel.html"; // İleride yapacağımız AFAD paneli
        } 
        else if (data.role === 'volunteer') {
            window.location.href = "volunteer-panel.html"; // İleride yapacağımız Gönüllü paneli
        } 
        else {
            window.location.href = "create-request.html"; // Afetzede talep ekranı
        }
    } else {
        // Hatalı giriş (Şifre yanlış vs.)
        errorMsg.style.display = "block";
        errorMsg.innerText = data.message;
    }
  })
  .catch(err => console.error("Hata:", err));
}
</script>

</body>
</html>
